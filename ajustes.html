<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pontos do Grupo • Ajustes</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/app.css" />
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="hello">
        <p class="title" id="helloTitle">Olá, user!</p>
        <p class="subtitle" id="helloSub">Ajustes</p>
      </div>
      <div class="avatar" id="avatar">U</div>
    </div>

    <div class="content">
      <section id="view-ajustes">
        <div class="card">
          <p class="panelTitle">Ajustes</p>
          <p class="panelSub">Todo mundo pode mexer: nome e foto do próprio perfil</p>

          <div class="form">
            <label>Meu perfil</label>
            <select id="selMyProfile"></select>

            <label>Meu nome</label>
            <input id="inpMyName" placeholder="Seu nome" />

            <label>Minha foto</label>
            <input id="inpMyPhoto" type="file" accept="image/*" />

            <button class="secondary" id="btnSaveMyProfile">Salvar</button>
          </div>

          <div class="hint" style="margin-top:12px">
            Isso altera seu avatar no app (salvo localmente).
          </div>
        </div>
      </section>
    </div>
  </div>

  <nav class="bottomNav">
    <a class="navBtn" href="home.html"><span class="dot"></span>Home</a>
    <a class="navBtn" href="lancar.html"><span class="dot"></span>Lançar</a>
    <a class="navBtn" href="loja.html"><span class="dot"></span>Loja</a>
    <a class="navBtn active" href="ajustes.html"><span class="dot"></span>Ajustes</a>
    <a class="navBtn" href="lider.html"><span class="dot"></span>Líder</a>
  </nav>

  <script src="assets/app.js"></script>
</body>
</html>
